name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: electron/package-lock.json

      - name: Install dependencies
        working-directory: electron
        run: npm ci

      - name: Build (NSIS + APPX)
        working-directory: electron
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run dist

      - name: Upload installer + appx
        uses: softprops/action-gh-release@v2
        with:
          files: |
            electron/release/*.exe
            electron/release/*.appx
          generate_release_notes: true

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: electron/package-lock.json

      - name: Install build deps
        run: |
          sudo apt-get install -y rpm fakeroot
          sudo snap install snapcraft --classic

      - name: Install dependencies
        working-directory: electron
        run: npm ci

      - name: Build (AppImage + Snap)
        working-directory: electron
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run dist

      - name: Upload AppImage + Snap to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            electron/release/*.AppImage
            electron/release/*.snap
          generate_release_notes: true

      - name: Publish to Snap Store
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_TOKEN }}
          SNAPCRAFT_STORE_AUTH: candid
        run: |
          snap_file=$(ls electron/release/*.snap 2>/dev/null | head -1)
          if [ -n "$snap_file" ]; then
            snapcraft upload "$snap_file" --release=stable
          else
            echo "No .snap file found, skipping upload"
          fi
